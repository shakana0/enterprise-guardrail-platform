name: Start AKS Automatic
on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *" # Runs every morning at 09:00 UTC

jobs:
  start-aks:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Start AKS Cluster
        run: |
          az aks start --name egp-aks --resource-group egp-platform-rg
